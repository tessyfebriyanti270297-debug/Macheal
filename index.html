<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macheal Lock</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  font-family:Arial;
}

.card{
  width:330px;
  padding:30px 25px;
  text-align:center;
  color:white;
  background:#111;
  border-radius:25px;
  border-left:6px solid red;
  border-right:6px solid red;
  box-shadow:0 0 18px rgba(255,0,0,0.4);
}

.title{
  font-size:28px;
  font-weight:bold;
  margin-bottom:15px;
}

.warning{
  font-size:16px;
  margin-bottom:10px;
  color:#ff4d4d;
}

.sub{
  margin:20px 0 25px 0;
  font-size:18px;
}

input{
  width:85%;
  padding:12px;
  border:none;
  border-radius:12px;
  text-align:center;
  font-size:20px;
  outline:none;
}

button{
  margin-top:18px;
  padding:12px 25px;
  border:none;
  border-radius:12px;
  background:red;
  color:white;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

button:active{
  transform:scale(0.95);
}

.msg{
  margin-top:15px;
  font-size:15px;
  opacity:0.9;
}
</style>
</head>

<body>

<div class="card" id="box">
  <div class="title">Macheal</div>

  <div class="warning">bayar 3jt agar data lu gk ilng</div>

  <div class="sub">hallo brayy🗿🙏</div>

  <input id="pin" type="password" placeholder="Masukkan code">

  <br>

  <button onclick="cek()">Unlock</button>

  <div class="msg" id="msg"></div>
</div>

<script>
function cek(){
  let val = document.getElementById("pin").value;

  if(val === "1472013"){

    // efek unlock dulu biar real
    document.getElementById("box").innerHTML = `
      <h2>Unlocked 🔓</h2>
      <p>Memuat sistem...</p>
    `;

    // auto keluar setelah 2 detik
    setTimeout(()=>{
      window.location.href = "about:blank";
    }, 2000);

  } else {
    document.getElementById("msg").innerText = "PIN salah 🗿";
  }
}
</script>

</body>
</html>
